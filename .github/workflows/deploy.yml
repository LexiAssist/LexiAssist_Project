name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest

      - name: Deploy to Hetzner staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LEXIASSIST_STAGING_HOST }}
          username: ${{ secrets.LEXIASSIST_STAGING_USER }}
          key: ${{ secrets.LEXIASSIST_STAGING_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ env.REPO_LOWER }}:latest
            cd /opt/app
            docker compose up -d --no-deps --build web
