name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      GH_ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest

      - name: Deploy to Hetzner staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LEXIASSIST_STAGING_HOST }}
          username: ${{ secrets.LEXIASSIST_STAGING_USER }}
          key: ${{ secrets.LEXIASSIST_STAGING_SSH_KEY }}
          command_timeout: 10m
          envs: GHCR_PAT,GH_ACTOR
          script: |
            echo $GHCR_PAT | docker login ghcr.io -u $GH_ACTOR --password-stdin
            docker pull ghcr.io/lexiassist/lexiassist_project:latest
            cd /opt/app
            docker compose up -d --no-deps web
